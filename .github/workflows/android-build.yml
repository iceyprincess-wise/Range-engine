name: Build Native Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
          
      - name: Setup Java JDK (Android Requirement)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Install Dependencies
        working-directory: ./artifacts/mockup-sandbox
        run: pnpm install --no-frozen-lockfile
        
      - name: Build Web Assets
        working-directory: ./artifacts/mockup-sandbox
        run: pnpm run build
        
      - name: Sync Capacitor Android
        working-directory: ./artifacts/mockup-sandbox
        run: pnpm exec cap sync android
        
      - name: Compile APK (Android Studio Build)
        working-directory: ./artifacts/mockup-sandbox/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Splendor-Hub-App
          path: artifacts/mockup-sandbox/android/app/build/outputs/apk/debug/app-debug.apk
